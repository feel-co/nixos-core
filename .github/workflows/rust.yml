name: Formatting Checks & Lints

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Lint Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install nightly rustfmt
        # rustfmt.toml turns on unstable features (wrap_comments, group_imports,
        # etc.) that stable rustfmt refuses. Keep the rest on stable so clippy
        # lints track what contributors actually have installed.
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo +nightly fmt --check

      - name: Build
        run: cargo +stable build

      - name: Run tests
        run: cargo +stable test --all-features

      - name: Clippy lints
        run: cargo +stable clippy --all-targets -- -D warnings
